<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자소서 AI — AI 자기소개서 첨삭</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="#">
        <span class="brand-mark">✍️</span>
        <span class="brand-name">자소서 AI</span>
      </a>
      <span class="nav-pill">Claude Opus 4.7</span>
    </div>
  </nav>

  <div class="page">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-chip">무료 · 즉시 · 무제한</div>
      <h1>합격률을 높이는<br/><em>AI 자기소개서 첨삭</em></h1>
      <p class="hero-desc">지원 직무와 회사에 맞춘 심층 분석, 점수, 개선안,<br/>완성된 첨삭본까지 한 번에 받아보세요</p>
    </section>

    <!-- Input Card -->
    <div class="card input-card">
      <div class="card-head">
        <div class="card-head-left">
          <span class="step-dot">1</span>
          <h2>자기소개서 입력</h2>
        </div>
        <span class="tip-text">Ctrl+Enter로 바로 분석</span>
      </div>

      <div class="meta-row">
        <div class="field-wrap">
          <label for="jobTitle">지원 직무 <span class="opt-tag">선택</span></label>
          <div class="input-wrap">
            <span class="input-icon">💼</span>
            <input type="text" id="jobTitle" placeholder="백엔드 개발자, 마케터, 디자이너..." autocomplete="off" />
          </div>
        </div>
        <div class="field-wrap">
          <label for="company">지원 회사 <span class="opt-tag">선택</span></label>
          <div class="input-wrap">
            <span class="input-icon">🏢</span>
            <input type="text" id="company" placeholder="카카오, 삼성전자, 네이버..." autocomplete="off" />
          </div>
        </div>
      </div>

      <div class="field-wrap">
        <div class="textarea-label-row">
          <label for="coverLetter">자기소개서 본문</label>
          <span class="char-badge" id="charBadge">0자</span>
        </div>
        <textarea
          id="coverLetter"
          rows="14"
          placeholder="자기소개서 내용을 여기에 붙여넣으세요.&#10;&#10;최소 50자 이상 입력하면 분석을 시작할 수 있습니다."
        ></textarea>
        <div class="char-track">
          <div class="char-fill" id="charFill"></div>
        </div>
        <p class="char-hint" id="charHint">최소 50자 이상 입력해주세요</p>
      </div>

      <button id="analyzeBtn" onclick="analyze()">
        <span id="btnIcon" class="btn-icon-wrap">🔍</span>
        <span id="btnText">첨삭 시작하기</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>

    <!-- Result Section -->
    <section id="resultSection" class="result-section hidden">

      <div class="result-top-row">
        <div class="result-top-left">
          <span class="step-dot step-dot--purple">2</span>
          <h2>첨삭 결과</h2>
        </div>
        <button class="copy-btn" onclick="copyResult()">
          <span>📋</span> 결과 복사
        </button>
      </div>

      <!-- Loading -->
      <div id="loadingCard" class="card loading-card">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p class="loading-text">Claude AI가 자기소개서를 분석하는 중입니다...</p>
      </div>

      <!-- Streaming live preview -->
      <div id="streamCard" class="card stream-card hidden">
        <div class="stream-header">
          <span class="live-badge">●</span>
          <span>실시간 분석 중</span>
        </div>
        <div id="streamContent" class="stream-content"></div>
        <span id="cursor" class="cursor"></span>
      </div>

      <!-- Final section cards -->
      <div id="resultCards" class="result-cards hidden"></div>

    </section>

  </div>

  <footer class="footer">
    <p>Powered by <strong>Claude Opus 4.7</strong> · Anthropic AI</p>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const textarea   = document.getElementById('coverLetter');
    const charBadge  = document.getElementById('charBadge');
    const charFill   = document.getElementById('charFill');
    const charHint   = document.getElementById('charHint');
    const MIN        = 50;
    const SOFT_MAX   = 1500;

    textarea.addEventListener('input', updateChar);

    function updateChar() {
      const len = textarea.value.length;
      charBadge.textContent = len.toLocaleString() + '자';
      charFill.style.width  = Math.min((len / SOFT_MAX) * 100, 100) + '%';

      if (len === 0) {
        charHint.textContent  = '최소 50자 이상 입력해주세요';
        charHint.className    = 'char-hint';
        charFill.style.background = '';
      } else if (len < MIN) {
        charHint.textContent  = `${MIN - len}자 더 입력해주세요`;
        charHint.className    = 'char-hint hint-warn';
        charFill.style.background = '#f59e0b';
      } else {
        charHint.textContent  = '✓ 분석 준비 완료';
        charHint.className    = 'char-hint hint-ok';
        charFill.style.background = '#10b981';
      }
    }

    let fullText = '';

    async function analyze() {
      const text     = textarea.value.trim();
      const jobTitle = document.getElementById('jobTitle').value.trim();
      const company  = document.getElementById('company').value.trim();

      if (text.length < MIN) {
        showToast('자기소개서를 최소 50자 이상 입력해주세요.');
        textarea.focus();
        return;
      }

      const btn         = document.getElementById('analyzeBtn');
      const btnIcon     = document.getElementById('btnIcon');
      const btnText     = document.getElementById('btnText');
      const resultSec   = document.getElementById('resultSection');
      const loadingCard = document.getElementById('loadingCard');
      const streamCard  = document.getElementById('streamCard');
      const streamCont  = document.getElementById('streamContent');
      const cursor      = document.getElementById('cursor');
      const resultCards = document.getElementById('resultCards');

      btn.disabled = true;
      btnIcon.textContent = '⏳';
      btnIcon.classList.add('spinning');
      btnText.textContent = '분석 중...';

      resultSec.classList.remove('hidden');
      loadingCard.classList.remove('hidden');
      streamCard.classList.add('hidden');
      resultCards.classList.add('hidden');
      resultCards.innerHTML = '';
      streamCont.innerHTML  = '';
      cursor.style.display  = '';
      fullText = '';

      resultSec.scrollIntoView({ behavior: 'smooth', block: 'start' });

      try {
        const res = await fetch('/api/analyze', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ text, jobTitle, company }),
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || '서버 오류가 발생했습니다.');
        }

        loadingCard.classList.add('hidden');
        streamCard.classList.remove('hidden');

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let done   = false;

        while (!done) {
          const { done: d, value } = await reader.read();
          if (d) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') { done = true; break; }
            try {
              const { text: chunk, error } = JSON.parse(payload);
              if (error) throw new Error(error);
              if (chunk) {
                fullText += chunk;
                streamCont.innerHTML = marked.parse(fullText);
              }
            } catch (e) {
              if (e.message !== 'Unexpected end of JSON input') throw e;
            }
          }
        }

        cursor.style.display = 'none';
        streamCard.classList.add('hidden');
        renderResultCards(fullText);

      } catch (err) {
        loadingCard.classList.add('hidden');
        streamCard.classList.add('hidden');
        resultCards.innerHTML = `<div class="error-card">❌ ${err.message}</div>`;
        resultCards.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnIcon.textContent = '🔍';
        btnIcon.classList.remove('spinning');
        btnText.textContent = '다시 첨삭하기';
      }
    }

    /* ── Section parsing & card rendering ─────────────────────── */

    function parseSections(md) {
      const parts = md.split(/^(## .+)$/m);
      const out = [];
      for (let i = 1; i < parts.length; i += 2) {
        out.push({
          heading: parts[i].replace(/^## /, '').trim(),
          body:    (parts[i + 1] || '').trim(),
        });
      }
      return out;
    }

    function sectionType(heading) {
      if (heading.includes('종합 평가')) return 'overview';
      if (heading.includes('점수'))     return 'score';
      if (heading.includes('잘된'))     return 'good';
      if (heading.includes('개선'))     return 'improve';
      if (heading.includes('첨삭된'))   return 'revised';
      return 'default';
    }

    function renderResultCards(md) {
      const container = document.getElementById('resultCards');
      container.innerHTML = '';
      const sections = parseSections(md);

      sections.forEach(sec => {
        const type = sectionType(sec.heading);
        const card = document.createElement('div');
        card.className = `rcard rcard--${type}`;

        const head = document.createElement('div');
        head.className = 'rcard-head';
        head.innerHTML = `<span class="rcard-title">${sec.heading}</span>`;

        const body = document.createElement('div');
        body.className = 'rcard-body';
        body.innerHTML = type === 'score' ? buildScoreHTML(sec.body) : marked.parse(sec.body);

        card.appendChild(head);
        card.appendChild(body);
        container.appendChild(card);
      });

      container.classList.remove('hidden');

      /* animate score bars after DOM insert */
      requestAnimationFrame(() => {
        document.querySelectorAll('.sbar-fill[data-w]').forEach(el => {
          el.style.width = el.dataset.w;
        });
      });

      container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Score card builder ────────────────────────────────────── */

    function scoreColor(pct)  { return pct >= 80 ? '#10b981' : pct >= 60 ? '#f59e0b' : '#ef4444'; }
    function scoreGrade(pct)  { return pct >= 90 ? 'S' : pct >= 80 ? 'A' : pct >= 70 ? 'B' : pct >= 60 ? 'C' : 'D'; }

    function buildScoreHTML(body) {
      const totalM = body.match(/전체 완성도.*?(\d+)점/);
      const total  = totalM ? parseInt(totalM[1]) : null;

      const subRe  = /(내용의 구체성|문장 표현력|직무 적합성|차별화 포인트)[^0-9]*(\d+)점/g;
      const subs   = [];
      let m;
      while ((m = subRe.exec(body)) !== null)
        subs.push({ label: m[1], score: parseInt(m[2]), max: 25 });

      /* fallback: couldn't parse → render as markdown */
      if (total === null && subs.length === 0) return marked.parse(body);

      let html = '';

      if (total !== null) {
        const c   = scoreColor(total);
        const deg = Math.round(total * 3.6);
        html += `
          <div class="score-summary">
            <div class="score-ring" style="background:conic-gradient(${c} ${deg}deg,#e4e8f0 0deg)">
              <div class="score-ring-inner">
                <span class="score-big">${total}</span>
                <span class="score-small">/ 100</span>
              </div>
            </div>
            <div class="score-meta">
              <div class="score-grade" style="color:${c}">${scoreGrade(total)}등급</div>
              <div class="score-desc">전체 완성도</div>
            </div>
          </div>`;
      }

      if (subs.length > 0) {
        html += '<div class="score-bars">';
        subs.forEach(s => {
          const pct = Math.round((s.score / s.max) * 100);
          const c   = scoreColor(pct);
          html += `
            <div class="sbar-item">
              <div class="sbar-meta">
                <span class="sbar-label">${s.label}</span>
                <span class="sbar-val" style="color:${c}">${s.score}<em>/${s.max}</em></span>
              </div>
              <div class="sbar-track">
                <div class="sbar-fill" data-w="${pct}%" style="width:0%;background:${c}"></div>
              </div>
            </div>`;
        });
        html += '</div>';
      }

      return html;
    }

    /* ── Copy & Toast ──────────────────────────────────────────── */

    function copyResult() {
      if (!fullText) return;
      navigator.clipboard.writeText(fullText)
        .then(() => showToast('결과가 클립보드에 복사되었습니다.'));
    }

    function showToast(msg) {
      document.querySelector('.toast')?.remove();
      const t = document.createElement('div');
      t.className   = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
    }

    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
